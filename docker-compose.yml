services:
  yolo-backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: hellobrick-yolo
    ports:
      - "3003:3003"
    restart: always
    volumes:
      - ./server/models:/app/models
    environment:
      - PORT=3003
      - GUNICORN_CMD_ARGS="--timeout 120 --workers 1 --threads 4"

  n8n:
    image: n8nio/n8n:latest
    container_name: hellobrick-n8n
    ports:
      - "5678:5678"
    restart: always
    volumes:
      - ./automation/n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
