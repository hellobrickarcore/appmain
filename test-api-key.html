<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Gemini API Key</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .status {
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .status.checking { background: #e3f2fd; color: #1976d2; }
        .status.success { background: #e8f5e9; color: #2e7d32; }
        .status.error { background: #ffebee; color: #c62828; }
        button {
            background: #1976d2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover { background: #1565c0; }
        pre {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔑 Gemini API Key Tester</h1>
        <p>Test if your API key is working without needing browser console.</p>
        
        <div id="status"></div>
        
        <button onclick="testAPI()">Test API Key</button>
        
        <div id="result" style="margin-top: 20px;"></div>
    </div>

    <script type="module">
        async function testAPI() {
            const statusDiv = document.getElementById('status');
            const resultDiv = document.getElementById('result');
            
            statusDiv.innerHTML = '<div class="status checking">🔄 Testing API key...</div>';
            resultDiv.innerHTML = '';
            
            try {
                // Get API key from environment (this will be replaced by Vite)
                const apiKey = import.meta.env.VITE_GEMINI_API_KEY;
                
                if (!apiKey) {
                    throw new Error('API key not found. Check .env.local file.');
                }
                
                resultDiv.innerHTML = `<pre>API Key found: ${apiKey.substring(0, 15)}... (${apiKey.length} chars)</pre>`;
                
                // Test with a simple API call
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: 'Say "Hello" if you can read this.'
                            }]
                        }]
                    })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error?.message || `HTTP ${response.status}: ${response.statusText}`);
                }
                
                statusDiv.innerHTML = '<div class="status success">✅ API Key is working!</div>';
                resultDiv.innerHTML += `<pre>Response: ${JSON.stringify(data, null, 2)}</pre>`;
                
            } catch (error) {
                statusDiv.innerHTML = '<div class="status error">❌ API Key Test Failed</div>';
                resultDiv.innerHTML = `<pre>Error: ${error.message}\n\nFull error: ${error}</pre>`;
            }
        }
        
        // Make function available globally
        window.testAPI = testAPI;
        
        // Auto-test on load
        setTimeout(testAPI, 500);
    </script>
</body>
</html>
