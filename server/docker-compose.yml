      - VITE_SUPABASE_URL=https://tlcqiixlpmpguixzbbxj.supabase.co

  xp-backend:
    build: .
    container_name: hellobrick-xp
    restart: always
    ports:
      - "3005:3005"
    command: ["python3", "xp-service.py"]
    environment:
      - PYTHONUNBUFFERED=1

  feed-backend:
    build: .
    container_name: hellobrick-feed
    restart: always
    ports:
      - "3006:3006"
    command: ["python3", "feed-service.py"]
    environment:
      - PYTHONUNBUFFERED=1

  admin-backend:
    build: .
    container_name: hellobrick-admin
