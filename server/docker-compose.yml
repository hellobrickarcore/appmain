version: '3.8'

services:
  yolo-backend:
    build: .
    container_name: hellobrick-yolo
    restart: always
    ports:
      - "3003:3003"
    environment:
      - PYTHONUNBUFFERED=1
      - SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRsY3FpaXhscG1wZ3VpeHpiYnhqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjQ0ODk3MCwiZXhwIjoyMDg4MDI0OTcwfQ.OK9uiI8sl-sRk7BlpsLkFxs-gxFzDj3RpJsivpgCvTg
      - VITE_SUPABASE_URL=https://tlcqiixlpmpguixzbbxj.supabase.co
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M

  auth-backend:
    build: .
    container_name: hellobrick-auth-unified
    restart: always
    ports:
      - "3007:3007"
    command: ["python3", "auth-service.py"]
    environment:
      - PYTHONUNBUFFERED=1
      - SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRsY3FpaXhscG1wZ3VpeHpiYnhqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjQ0ODk3MCwiZXhwIjoyMDg4MDI0OTcwfQ.OK9uiI8sl-sRk7BlpsLkFxs-gxFzDj3RpJsivpgCvTg
      - VITE_SUPABASE_URL=https://tlcqiixlpmpguixzbbxj.supabase.co
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
