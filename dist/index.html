<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="HelloBrick - The world's most advanced AI brick scanner. Organize, discover, and build with your collection like a master." />
    <meta name="keywords" content="LEGO, brick scanner, AI detection, brick manager, building instructions, brick collection" />
    <meta name="theme-color" content="#050A18" />
    <meta name="apple-mobile-web-app-title" content="HelloBrick" />
    <!-- iOS Safari -->
    <meta name="apple-touch-fullscreen" content="yes" />
    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="./manifest.json" />
    <title>HelloBrick - AI Building Brick Scanner</title>
    <!-- Preload critical resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fallback if Tailwind CDN fails -->
    <style>
      body { margin: 0; padding: 0; background: #fff7ed; }
      #root { min-height: 100vh; }
      .loading { 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        min-height: 100vh; 
        background: linear-gradient(to bottom right, #fff7ed, #fef3c7);
        font-family: system-ui, -apple-system, sans-serif;
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Nunito', sans-serif;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Poppins', sans-serif;
      }
      
      /* Custom scrollbar hiding */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      /* Animations */
      @keyframes scan {
        0% { transform: translateY(0); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(300px); opacity: 0; }
      }
      @keyframes spin-slow {
        from { transform: rotate(0deg) scale(1.1); }
        to { transform: rotate(360deg) scale(1.1); }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-BNGWlKyh.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BLp1pZJJ.css">
  </head>
  <body class="bg-gradient-to-br from-[#FFCE4A]/10 via-[#7AC7FF]/10 to-[#FF9AA2]/10 antialiased">
    <div id="root">
      <div class="loading">
        <div style="text-align: center;">
          <div style="width: 50px; height: 50px; border: 4px solid #f3f4f6; border-top: 4px solid #fb923c; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
          <p style="color: #6b7280; font-size: 16px;">Loading HelloBrick...</p>
        </div>
      </div>
    </div>
    <script>
      // Bypass ngrok warning page on mobile
      (function() {
        if (window.location.hostname.includes('ngrok')) {
          // Set cookie to skip warning
          document.cookie = 'ngrok-skip-browser-warning=true; path=/; max-age=86400';
          // Also try to click through if warning page is present
          setTimeout(function() {
            const warningBtn = document.querySelector('a[href*="ngrok"]') || 
                              document.querySelector('button') ||
                              document.querySelector('[onclick*="ngrok"]');
            if (warningBtn && document.body.innerText.includes('ngrok')) {
              warningBtn.click();
            }
          }, 100);
        }
      })();
      
      // Immediate error handling
      window.addEventListener('error', function(e) {
        console.error('Global error:', e.error);
        const root = document.getElementById('root');
        if (root && root.children.length === 0) {
          root.innerHTML = '<div style="padding: 20px; text-align: center; min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; background: linear-gradient(to bottom right, #fff7ed, #fef3c7);"><h1 style="color: #dc2626; margin-bottom: 10px;">Error Loading App</h1><p style="color: #6b7280; margin-bottom: 20px;">' + (e.error?.message || 'Unknown error') + '</p><button onclick="location.reload()" style="padding: 12px 24px; background: #fb923c; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer;">Reload App</button></div>';
        }
      });
      
      // Unhandled promise rejection
      window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled promise rejection:', e.reason);
      });
      
      // Check if root exists before React loads
      if (!document.getElementById('root')) {
        document.body.innerHTML = '<div style="padding: 20px; text-align: center; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(to bottom right, #fff7ed, #fef3c7);"><h1 style="color: #dc2626;">Error: Root element not found</h1></div>';
      }
      
      console.log('✅ HTML loaded, waiting for React...');

      // SAFE MODE: If nothing renders in 3 seconds, show emergency UI
      setTimeout(function() {
        const root = document.getElementById('root');
        if (root && root.innerHTML.includes('loading')) {
          console.error('🛑 REACT MOUNT TIMEOUT: App stuck on loader');
          root.innerHTML = `
            <div style="padding: 40px; text-align: center; background: #fff; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif;">
              <h1 style="color: #000; font-size: 24px;">Native Load Failure</h1>
              <p style="color: #666; margin: 20px 0;">The application failed to initialize React within 3s.</p>
              <div id="debug-info" style="font-size: 10px; color: #999; text-align: left; background: #f5f5f5; padding: 10px; border-radius: 8px; width: 80%; overflow: auto;">
                Platform: ${navigator.userAgent}<br>
                Location: ${window.location.href}
              </div>
              <button onclick="location.reload()" style="margin-top: 30px; background: #000; color: #fff; padding: 12px 24px; border: none; border-radius: 12px; font-weight: bold;">Retry Startup</button>
            </div>
          `;
        }
      }, 3000);
    </script>
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </body>
</html>
