<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelloBrick Test</title>
    <style>
        body {
            font-family: system-ui;
            padding: 20px;
            background: #fff7ed;
        }
        .test-item {
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-radius: 8px;
        }
        .pass { color: green; }
        .fail { color: red; }
    </style>
</head>
<body>
    <h1>HelloBrick Connection Test</h1>
    <div id="results"></div>
    <script>
        const results = document.getElementById('results');
        const tests = [];
        
        function test(name, condition) {
            const result = condition();
            tests.push({ name, result });
            const div = document.createElement('div');
            div.className = 'test-item';
            div.innerHTML = `<strong>${name}:</strong> <span class="${result ? 'pass' : 'fail'}">${result ? '✅ PASS' : '❌ FAIL'}</span>`;
            results.appendChild(div);
        }
        
        test('JavaScript Enabled', () => true);
        test('Root Element Exists', () => !!document.getElementById('root'));
        test('Console Available', () => typeof console !== 'undefined');
        test('Fetch Available', () => typeof fetch !== 'undefined');
        test('LocalStorage Available', () => {
            try {
                localStorage.setItem('test', 'test');
                localStorage.removeItem('test');
                return true;
            } catch(e) {
                return false;
            }
        });
        
        // Test API connection
        fetch('/api/health')
            .then(r => r.json())
            .then(data => {
                test('API Connection', () => data.status === 'ok');
            })
            .catch(() => {
                test('API Connection', () => false);
            });
        
        console.log('Test page loaded');
        console.log('User Agent:', navigator.userAgent);
        console.log('Location:', window.location.href);
    </script>
</body>
</html>
