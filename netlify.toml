[build]
  base = "website/react-landing"
  publish = "dist"
  command = "npm install && npm run build"

[[redirects]]
  from = "/api/*"
  to = "http://174.138.93.172/api/:splat"
  status = 200
  force = true

[[redirects]]
  # Support Single Page Application (SPA) routing: 
  # Redirect all requests to index.html if the file doesn't exist
  from = "/*"
  to = "/index.html"
  status = 200
