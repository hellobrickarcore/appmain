<!DOCTYPE html>
<html lang="en">
<head>

    <script>
        // REPLACE WITH ACTUAL APP STORE URL ONCE APPROVED

        // Track conversion (placeholder for User's analytics)

        setTimeout(() => {
            window.location.href = APP_STORE_URL;
        }, 800);
    </script>
